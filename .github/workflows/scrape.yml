name: Scrape Properties

on:
  schedule:
    - cron: '0 8 * * *'  # Todos los días a las 8:00 UTC (~5 AM Buenos Aires)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python actionscraping.py

      - name: Commit cambios si los hay
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      
          git add docs/data/propiedades.json
      
          # Exit cleanly if no changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
      
          git commit -m "🔄 Auto-update propiedades.json"
      
          # Sync with latest remote main to avoid non-fast-forward push rejection
          git pull --rebase origin main
          git push origin HEAD:main
